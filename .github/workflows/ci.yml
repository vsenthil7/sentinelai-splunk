name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Type check
        run: mypy app
      - name: Migrations apply cleanly
        run: |
          SENTINEL_DATABASE_URL="sqlite+aiosqlite:///./ci.db" alembic upgrade head
      - name: Tests with coverage gate
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=95

  frontend-unit:
    name: Frontend (types, build, unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npx tsc -b
      - name: Build
        run: npm run build
      - name: Unit tests (enforced coverage thresholds)
        run: npm run test:unit

  e2e:
    name: E2E (Playwright, web + mobile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Install frontend
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e (desktop + mobile)
        run: npm run test:e2e
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t sentinelai-backend ./backend
      - name: Build frontend image
        run: docker build -t sentinelai-frontend ./frontend
